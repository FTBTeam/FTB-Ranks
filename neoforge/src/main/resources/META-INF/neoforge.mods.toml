modLoader = "javafml"
loaderVersion = "[${neoforge_loader_version},)"
issueTrackerURL = "https://go.ftb.team/support-mod-issues"
license = "All Rights Reserved"

[[mods]]
modId = "ftbranks"
version = "${version}"
displayName = "FTB Ranks"
authors = "FTB Team"
description = '''
A simple mod that lets you create ranks for players, similar to Discord roles, and manage permissions for them
'''
displayTest="IGNORE_SERVER_VERSION"

[[mixins]]
config = "ftbranks-common.mixins.json"

[[dependencies.ftbranks]]
modId = "neoforge"
type = "required"
versionRange = "${neoforge_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.ftbranks]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range_maven}"
ordering = "NONE"
side = "BOTH"

[[dependencies.ftbranks]]
modId = "ftblibrary"
type = "required"
versionRange = "${ftb_library_version_range_maven}"
ordering = "AFTER"
side = "CLIENT"

